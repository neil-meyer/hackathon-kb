<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e4e2da;
    --border-strong: #c8c5bb;
    --text: #1a1916;
    --text-muted: #6b6860;
    --text-faint: #9e9c96;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent-mid: #4a8c5f;
    --user-bubble: #1a1916;
    --user-text: #f7f6f2;
    --assistant-bubble: #ffffff;
    --assistant-border: #e4e2da;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1d1a;
      --border: #2e2c28;
      --border-strong: #3e3c38;
      --text: #f0ede6;
      --text-muted: #8a8880;
      --text-faint: #5a5855;
      --accent: #6ab87e;
      --accent-light: #1a2e1f;
      --accent-mid: #4a8c5f;
      --user-bubble: #f0ede6;
      --user-text: #141412;
      --assistant-bubble: #1e1d1a;
      --assistant-border: #2e2c28;
    }
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
  }

  .layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 16px; height: 16px; }

  .header-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .api-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .api-status:hover { border-color: var(--border-strong); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #9e9c96;
    flex-shrink: 0;
  }

  .status-dot.connected { background: #4a8c5f; }
  .status-dot.error { background: #c0392b; }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-clear:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }

  /* System prompt config panel */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 14px 0 0;
    display: none;
    flex-shrink: 0;
  }

  .config-panel.open { display: block; }

  .config-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .api-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .api-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .api-row input:focus { border-color: var(--accent-mid); }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.88; }

  .system-prompt-area {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 9px 11px;
    resize: vertical;
    min-height: 72px;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .system-prompt-area:focus { border-color: var(--accent-mid); }

  /* Messages */
  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 8px;
    scroll-behavior: smooth;
  }

  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-track { background: transparent; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-faint);
    text-align: center;
    padding: 40px 20px;
  }

  .empty-icon {
    width: 40px;
    height: 40px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    margin-bottom: 4px;
  }

  .empty-state p { font-size: 14px; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    justify-content: center;
    margin-top: 8px;
  }

  .suggestion-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }

  .suggestion-chip:hover {
    border-color: var(--accent-mid);
    color: var(--text);
    background: var(--accent-light);
  }

  .message {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    animation: fadeSlide 0.2s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.user-av {
    background: var(--user-bubble);
    color: var(--user-text);
  }

  .avatar.assistant-av {
    background: var(--accent-light);
    color: var(--accent);
  }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-bottom-right-radius: 3px;
  }

  .message.assistant .bubble {
    background: var(--assistant-bubble);
    color: var(--text);
    border: 1px solid var(--assistant-border);
    border-bottom-left-radius: 3px;
  }

  .bubble code {
    font-family: var(--mono);
    font-size: 12.5px;
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .bubble pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
  }

  .bubble p + p { margin-top: 8px; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    align-items: center;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-faint);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 12px 0 20px;
    flex-shrink: 0;
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }

  .input-box:focus-within { border-color: var(--accent-mid); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14.5px;
    line-height: 1.5;
    outline: none;
    resize: none;
    max-height: 140px;
    overflow-y: auto;
    padding: 4px 0;
  }

  #user-input::placeholder { color: var(--text-faint); }

  .btn-send {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
    color: #fff;
  }

  .btn-send:hover:not(:disabled) { opacity: 0.85; }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 7px;
    padding: 0 2px;
  }

  .model-badge {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
  }

  .input-hint {
    font-size: 11px;
    color: var(--text-faint);
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #c0392b;
    color: #fff;
    font-size: 13px;
    padding: 9px 18px;
    border-radius: 20px;
    transition: transform 0.3s ease;
    z-index: 100;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="layout">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 4h10M3 8h7M3 12h5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="header-title">#hackathon-kb</div>
        <div class="header-subtitle">Knowledge Base Assistant</div>
      </div>
    </div>
    <div class="header-right">
      <div class="api-status" id="api-status-btn" onclick="toggleConfig()" title="Configure API key">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Configure</span>
      </div>
      <button class="btn-clear" onclick="clearChat()">Clear</button>
    </div>
  </header>

  <!-- Config panel -->
  <div class="config-panel" id="config-panel">
    <div class="config-label">API Key</div>
    <div class="api-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" />
      <button class="btn-save" onclick="saveConfig()">Save</button>
    </div>
    <div class="config-label" style="margin-top:10px;">System Prompt</div>
    <textarea class="system-prompt-area" id="system-prompt" placeholder="You are a knowledgeable assistant for the hackathon knowledge base. Help team members find information, answer technical questions, and support project development. Be concise, accurate, and practical.">You are a knowledgeable assistant for the hackathon knowledge base. Help team members find information, answer technical questions, and support project development. Be concise, accurate, and practical.</textarea>
  </div>

  <!-- Messages -->
  <div class="messages-wrap" id="messages-wrap">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.25"/>
          <path d="M6.5 7.5C6.5 6.1 7.6 5 9 5s2.5 1.1 2.5 2.5c0 1.4-1.2 2-2.5 2.3V11" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
          <circle cx="9" cy="13" r="0.8" fill="currentColor"/>
        </svg>
      </div>
      <p>Ask anything about the knowledge base</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Summarize key concepts</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">What's the project scope?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">List open questions</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Technical stack overview</button>
      </div>
    </div>
    <div id="messages-list"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="user-input" rows="1" placeholder="Ask the knowledge base…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()" disabled title="Send">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 12V2M2 7l5-5 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="model-badge" id="model-badge">claude-sonnet-4-20250514</span>
      <span class="input-hint">⌘↵ to send</span>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const MODEL = 'claude-sonnet-4-20250514';
  let conversationHistory = [];
  let isLoading = false;

  const messagesWrap = document.getElementById('messages-wrap');
  const messagesList = document.getElementById('messages-list');
  const emptyState = document.getElementById('empty-state');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  function getApiKey() { return localStorage.getItem('kb_api_key') || ''; }
  function getSystemPrompt() { return document.getElementById('system-prompt').value.trim(); }

  function init() {
    const saved = getApiKey();
    if (saved) {
      document.getElementById('api-key-input').value = saved;
      setStatus('connected', 'Connected');
    }
    userInput.addEventListener('input', () => {
      sendBtn.disabled = !userInput.value.trim() || isLoading;
    });
  }

  function setStatus(state, label) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = label;
  }

  function toggleConfig() {
    const panel = document.getElementById('config-panel');
    panel.classList.toggle('open');
  }

  function saveConfig() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key) { showToast('Please enter an API key'); return; }
    localStorage.setItem('kb_api_key', key);
    setStatus('connected', 'Connected');
    document.getElementById('config-panel').classList.remove('open');
    showToast('API key saved ✓', 'success');
  }

  function clearChat() {
    conversationHistory = [];
    messagesList.innerHTML = '';
    emptyState.style.display = '';
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    const isMac = navigator.platform.includes('Mac');
    const send = isMac ? e.metaKey && e.key === 'Enter' : e.ctrlKey && e.key === 'Enter';
    if (send) { e.preventDefault(); sendMessage(); }
    if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && !e.ctrlKey) {
      e.preventDefault(); sendMessage();
    }
  }

  function sendSuggestion(btn) {
    userInput.value = btn.textContent;
    autoResize(userInput);
    sendBtn.disabled = false;
    sendMessage();
  }

  function appendMessage(role, content) {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (role === 'user' ? 'user-av' : 'assistant-av');
    avatar.textContent = role === 'user' ? 'You' : 'KB';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = renderMarkdown(content);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesList.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function appendTyping() {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar assistant-av';
    avatar.textContent = 'KB';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesList.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function scrollToBottom() {
    messagesWrap.scrollTop = messagesWrap.scrollHeight;
  }

  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code class="language-${lang}">${code.trim()}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<strong>$1</strong>')
      .replace(/^## (.+)$/gm, '<strong>$1</strong>')
      .replace(/^# (.+)$/gm, '<strong>$1</strong>')
      .replace(/^\- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^(?!<[a-z])(.+)/, '<p>$1</p>');
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    const apiKey = getApiKey();
    if (!apiKey) {
      document.getElementById('config-panel').classList.add('open');
      showToast('Please add your API key first');
      return;
    }

    isLoading = true;
    sendBtn.disabled = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    const typingEl = appendTyping();

    try {
      const body = {
        model: MODEL,
        max_tokens: 1000,
        messages: conversationHistory
      };
      const sp = getSystemPrompt();
      if (sp) body.system = sp;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(body)
      });

      typingEl.remove();

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message || `API error ${response.status}`;
        if (response.status === 401) { setStatus('error', 'Auth error'); }
        showToast(msg);
        isLoading = false;
        sendBtn.disabled = false;
        return;
      }

      const data = await response.json();
      const reply = data.content?.find(b => b.type === 'text')?.text || '';
      appendMessage('assistant', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      typingEl.remove();
      showToast('Network error — check your connection');
    }

    isLoading = false;
    sendBtn.disabled = !userInput.value.trim();
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type === 'success' ? '#2d5a3d' : '#c0392b';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  init();
</script>
</body>
</html>
